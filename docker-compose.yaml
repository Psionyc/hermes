version: "3.9"

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-agent
    restart: unless-stopped

    # Dokploy/Traefik should route the domain to this internal dashboard port.
    expose:
      - "9119"

    # Persist Hermes data
    volumes:
      - hermes_data:/root/.hermes

    environment:
      # Explicitly set data directory
      HERMES_HOME: /root/.hermes
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"

  caddy:
    image: caddy:2
    container_name: hermes-caddy
    restart: unless-stopped
    depends_on:
      - hermes

    # Route your Dokploy domain to this service on container port 8080.
    expose:
      - "8080"

    env_file:
      - .env

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  hermes_data:
