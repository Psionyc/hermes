version: "3.9"

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-agent
    restart: unless-stopped

    # Expose Hermes web UI/API
    ports:
      - "9119:9119"

    # Persist Hermes data
    volumes:
      - hermes_data:/root/.hermes

    environment:
      # Explicitly set data directory
      HERMES_HOME: /root/.hermes
      HERMES_DASHBOARD: 1

volumes:
  hermes_data: